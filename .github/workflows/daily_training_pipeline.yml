name: Daily Model Training Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Automatically runs at midnight (00:00) every single day
  workflow_dispatch:     # Gives you a manual testing button in your browser

jobs:
  retrain-models:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Multi-Model Training Pipeline
      run: python training_pipeline.py

    - name: Save Trained Model Weights Registry
      run: |
        git config --global user.name "GitHub Actions Automation Worker"
        git config --global user.email "actions@github.com"
        git add rawalpindi_aqi_model.h5 scaler.pkl || echo "No model created yet."
        git commit -m "🤖 Auto-Update: Registered champion model parameters [skip ci]" || echo "No variations logged."
        git push