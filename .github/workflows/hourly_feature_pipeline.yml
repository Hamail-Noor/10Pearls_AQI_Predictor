name: Hourly AQI Feature Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Automatically runs at minute 0 of every single hour
  workflow_dispatch:     # Gives you a manual testing button in your browser

jobs:
  update-features:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Extraction Script
      env:
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      run: python feature_pipeline.py

    - name: Save Updated Dataset Back To GitHub
      run: |
        git config --global user.name "GitHub Actions Automation Worker"
        git config --global user.email "actions@github.com"
        git add vertex_feature_store_matrix.csv || echo "No file created yet."
        git commit -m "🤖 Auto-Update: Ingested hourly feature snapshots [skip ci]" || echo "No data modifications."
        git push